<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow Header</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  .header {
    height: 70px;
    background: linear-gradient(to right, #1a1a1a, #2a2a2a);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
  }

  .logo {
    display: flex;
    align-items: center;
    font-size: 22px;
    font-weight: bold;
  }

  .logo span {
    color: red;
  }

  .logo svg {
    width: 30px;
    height: 30px;
    margin-right: 10px;
    fill: red;
  }

  .menu-btn {
    font-size: 28px;
    cursor: pointer;
  }

  .sidebar {
    position: fixed;
    top: 0;
    right: -100%;
    width: 80%;
    max-width: 320px;
    height: 100%;
    background: #0f0f0f;
    color: white;
    transition: 0.4s;
    padding: 20px;
    z-index: 1000;
  }

  .sidebar.active {
    right: 0;
  }

  .close-btn {
    font-size: 30px;
    text-align: right;
    cursor: pointer;
  }

  .menu {
    margin-top: 30px;
  }

  .menu a {
    display: block;
    padding: 15px 0;
    font-size: 18px;
    color: #bbb;
    text-decoration: none;
  }

  .menu a:hover {
    color: white;
  }

  .book-btn {
    margin-top: 30px;
    background: red;
    border: none;
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
  }

  .overlay.active {
    opacity: 1;
    visibility: visible;
  }
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24">
      <path d="M22 10V6c0-1.1-.9-2-2-2H4C2.9 4 2 4.9 2 6v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2zm-4 7H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2z"/>
    </svg>
    The<span>BookMyShow</span>
  </div>

  <div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
  <div class="close-btn" onclick="closeMenu()">✕</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">All Matches</a>
    <a href="#">Merchandise</a>
    <a href="#">Gallery</a>
    <a href="#">Reviews</a>
    <a href="#">FAQs</a>
    <a href="#">Contact</a>
  </div>

  <!-- UPDATED BUTTON -->
  <button class="book-btn" onclick="goToBooking()">Book Now</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<script>
  function openMenu() {
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
  }

  function closeMenu() {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
  }

  function goToBooking() {
    window.location.href = "https://the-book-my-show--in.pages.dev/";
  }
</script>

</body>
</html>
